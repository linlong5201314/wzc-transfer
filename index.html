<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a14" />
  <meta name="description" content="电脑与手机之间一键互传文字" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="文字传" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="icon" href="/icon-192.png" sizes="192x192" type="image/png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <title>文字传 · 电脑手机互传</title>
  <style>
    :root {
      /* === 五彩霓虹主色 === */
      --bg-base: #0a0a14;
      --primary-1: #ec4899;     /* 玫粉 */
      --primary-2: #a855f7;     /* 紫罗兰 */
      --primary-3: #6366f1;     /* 靛蓝 */
      --primary-4: #06b6d4;     /* 青色 */
      --primary-5: #22d3ee;     /* 水绿 */
      --success: #10b981;
      --danger: #f43f5e;

      /* === 玻璃材质 === */
      --glass-bg: rgba(15, 23, 42, 0.42);
      --glass-bg-strong: rgba(20, 30, 60, 0.58);
      --glass-border: rgba(255, 255, 255, 0.13);
      --glass-border-bright: rgba(255, 255, 255, 0.24);

      /* === 文字层级 === */
      --text: #f8fafc;
      --text-soft: #cbd5e1;
      --text-dim: #94a3b8;
      --text-muted: #64748b;

      /* === 圆角 === */
      --r-sm: 12px;
      --r-md: 18px;
      --r-lg: 28px;
      --r-pill: 999px;

      --shadow-card: 0 20px 50px -10px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      min-height: 100vh;
      background: var(--bg-base);
      color: var(--text);
      font-family: var(--font);
      overflow-x: hidden;
    }

    body {
      position: relative;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      display: flex;
      flex-direction: column;
      align-items: center;
      font-feature-settings: "ss01", "cv01", "cv11";
    }

    /* ========= 背景照片轮播 ========= */
    .bg-stage {
      position: fixed;
      inset: 0;
      z-index: -3;
      overflow: hidden;
      /* 兜底动态渐变(图片未加载时仍然好看) */
      background: linear-gradient(135deg, #1e1b4b, #312e81 25%, #1e3a8a 50%, #831843 75%, #831843);
      background-size: 400% 400%;
      animation: gradient-bg 35s ease infinite;
    }

    @keyframes gradient-bg {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .bg-layer {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: blur(38px) saturate(1.4) brightness(0.55);
      opacity: 0;
      transform: scale(1.18);
      transition: opacity 2.4s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: opacity, transform;
    }

    .bg-layer.active {
      opacity: 1;
      animation: ken-burns 16s ease-in-out infinite alternate;
    }

    @keyframes ken-burns {
      0%   { transform: scale(1.18) translate(0, 0); }
      100% { transform: scale(1.30) translate(-3%, -2%); }
    }

    /* ========= 漂浮极光球 ========= */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.42;
      z-index: -2;
      pointer-events: none;
      will-change: transform;
      mix-blend-mode: screen;
    }

    .orb-1 {
      width: 480px; height: 480px;
      background: radial-gradient(circle, var(--primary-1), transparent 65%);
      top: -8%; left: -8%;
      animation: drift-1 22s ease-in-out infinite;
    }
    .orb-2 {
      width: 540px; height: 540px;
      background: radial-gradient(circle, var(--primary-3), transparent 65%);
      bottom: -10%; right: -8%;
      animation: drift-2 26s ease-in-out infinite;
    }
    .orb-3 {
      width: 380px; height: 380px;
      background: radial-gradient(circle, var(--primary-4), transparent 65%);
      top: 50%; left: 50%;
      animation: drift-3 30s ease-in-out infinite;
    }

    @keyframes drift-1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(120px, 80px) scale(1.15); }
    }
    @keyframes drift-2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-100px, -60px) scale(1.1); }
    }
    @keyframes drift-3 {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-30%, -65%) scale(1.2); }
    }

    /* 暗角叠层增强可读性 */
    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(ellipse at center, transparent 0%, rgba(7, 9, 19, 0.55) 100%),
        linear-gradient(180deg, transparent 50%, rgba(7, 9, 19, 0.4) 100%);
    }

    /* ========= 主布局 ========= */
    .wrap {
      width: 100%;
      max-width: 880px;
      padding: 24px 20px 100px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      position: relative;
      z-index: 1;
    }

    /* ========= 顶部导航栏 ========= */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: var(--glass-bg);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-md);
      box-shadow: var(--shadow-card);
      animation: fade-down 0.7s cubic-bezier(0.16, 1, 0.3, 1) backwards;
    }

    @keyframes fade-down {
      from { opacity: 0; transform: translateY(-15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.5px;
    }

    .logo-mark {
      width: 42px; height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary-1) 0%, var(--primary-2) 50%, var(--primary-3) 100%);
      background-size: 200% 200%;
      display: grid; place-items: center;
      color: #fff;
      font-size: 20px;
      font-weight: 900;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 25px -5px rgba(168, 85, 247, 0.5), inset 0 0 0 1px rgba(255,255,255,0.15);
      animation: gradient-shift 6s ease-in-out infinite;
    }

    @keyframes gradient-shift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .logo-mark::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.3) 50%, transparent 70%);
      background-size: 200% 200%;
      animation: shine 3.5s ease-in-out infinite;
    }

    @keyframes shine {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .logo-text {
      background: linear-gradient(135deg, #fff 30%, #cbd5e1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-soft);
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-pill);
      transition: all 0.3s;
    }

    .status:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--glass-border-bright);
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: all 0.4s;
    }

    .dot.online {
      background: var(--success);
      box-shadow: 0 0 0 3px rgba(16,185,129,0.2), 0 0 16px var(--success);
      animation: dot-pulse 2.5s ease-in-out infinite;
    }
    .dot.offline {
      background: var(--danger);
      box-shadow: 0 0 12px var(--danger);
    }
    .dot.loading {
      background: var(--primary-3);
      animation: dot-loading 1.2s ease-in-out infinite;
    }

    @keyframes dot-pulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(16,185,129,0.2), 0 0 16px var(--success); }
      50% { box-shadow: 0 0 0 6px rgba(16,185,129,0.05), 0 0 24px var(--success); }
    }

    @keyframes dot-loading {
      0%, 100% { transform: scale(0.85); opacity: 0.7; }
      50% { transform: scale(1.25); opacity: 1; }
    }

    /* ========= 网格布局 ========= */
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
    }

    @media (min-width: 880px) {
      .grid { grid-template-columns: 1fr 1fr; }
      .span-full { grid-column: span 2; }
    }

    /* ========= 玻璃卡片 ========= */
    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(32px) saturate(160%);
      -webkit-backdrop-filter: blur(32px) saturate(160%);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-lg);
      padding: 26px;
      box-shadow: var(--shadow-card);
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 18px;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      animation: fade-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) backwards;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--r-lg);
      background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, transparent 30%);
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-4px);
      background: var(--glass-bg-strong);
      border-color: var(--glass-border-bright);
      box-shadow: var(--shadow-card), 0 30px 60px -15px rgba(168,85,247,0.3);
    }

    .grid > .card:nth-child(1) { animation-delay: 0.15s; }
    .grid > .card:nth-child(2) { animation-delay: 0.25s; }
    .grid > .card:nth-child(3) { animation-delay: 0.35s; }

    .card-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.2px;
    }

    .card-title .title-text {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-title .title-icon {
      width: 28px; height: 28px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(236,72,153,0.25), rgba(99,102,241,0.25));
      border: 1px solid rgba(255,255,255,0.08);
      display: grid; place-items: center;
      color: var(--primary-1);
    }
    .card-title .title-icon svg { width: 16px; height: 16px; }

    .card-title .meta {
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    /* ========= 收到的文字 ========= */
    .received-text {
      min-height: 130px;
      max-height: 320px;
      overflow-y: auto;
      padding: 18px;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: var(--r-md);
      font-size: 16px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
      transition: all 0.3s;
    }

    .received-text.empty {
      color: var(--text-muted);
      font-style: italic;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      border: 1px dashed rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.15);
    }

    .received-text.flash {
      animation: shimmer 1.4s ease-out;
    }

    @keyframes shimmer {
      0% {
        background: linear-gradient(135deg, rgba(236,72,153,0.3), rgba(99,102,241,0.3), rgba(6,182,212,0.3));
        border-color: rgba(168,85,247,0.5);
        box-shadow: 0 0 0 2px rgba(168,85,247,0.3), 0 0 30px rgba(168,85,247,0.4);
      }
      100% {
        background: rgba(0,0,0,0.25);
        border-color: rgba(255,255,255,0.05);
        box-shadow: none;
      }
    }

    /* ========= 编辑器 ========= */
    .editor-wrapper {
      position: relative;
      width: 100%;
    }

    textarea.editor {
      width: 100%;
      min-height: 130px;
      max-height: 320px;
      padding: 18px;
      padding-bottom: 38px;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: var(--r-md);
      color: var(--text);
      font-size: 16px;
      line-height: 1.7;
      font-family: inherit;
      resize: vertical;
      outline: none;
      transition: all 0.3s;
    }

    textarea.editor:focus {
      border-color: rgba(168,85,247,0.5);
      background: rgba(0, 0, 0, 0.35);
      box-shadow: 0 0 0 4px rgba(168,85,247,0.12);
    }

    textarea.editor::placeholder { color: var(--text-muted); }

    .char-count {
      position: absolute;
      right: 14px;
      bottom: 14px;
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      pointer-events: none;
      background: rgba(0,0,0,0.4);
      padding: 3px 9px;
      border-radius: var(--r-pill);
      border: 1px solid rgba(255,255,255,0.05);
    }

    /* ========= 按钮 ========= */
    .btn-row {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .btn {
      flex: 1;
      height: 50px;
      padding: 0 18px;
      border-radius: var(--r-md);
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      user-select: none;
      outline: none;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(255,255,255,0.18) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .btn:hover::after { opacity: 1; }

    .btn:hover {
      background: rgba(255,255,255,0.08);
      border-color: var(--glass-border-bright);
      transform: translateY(-2px);
    }

    .btn:active { transform: translateY(0); }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none !important;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--primary-1) 0%, var(--primary-2) 50%, var(--primary-3) 100%);
      background-size: 200% 200%;
      border: none;
      color: white;
      box-shadow: 0 8px 25px -5px rgba(168,85,247,0.6), inset 0 0 0 1px rgba(255,255,255,0.1);
      animation: gradient-shift 5s ease infinite;
    }

    .btn.primary:hover {
      box-shadow: 0 12px 35px -5px rgba(168,85,247,0.8), 0 0 25px rgba(236,72,153,0.3), inset 0 0 0 1px rgba(255,255,255,0.2);
      transform: translateY(-3px);
    }

    .btn.danger {
      color: var(--danger);
      background: rgba(244,63,94,0.08);
      border-color: rgba(244,63,94,0.2);
    }
    .btn.danger:hover {
      background: rgba(244,63,94,0.15);
      border-color: rgba(244,63,94,0.35);
    }

    .btn.ghost {
      background: transparent;
      border-color: transparent;
      color: var(--text-dim);
      flex: 0;
      min-width: 70px;
    }
    .btn.ghost:hover {
      color: var(--text);
      background: rgba(255,255,255,0.05);
    }

    .btn svg { width: 18px; height: 18px; transition: transform 0.3s; }
    .btn:hover svg { transform: scale(1.15) rotate(-5deg); }

    /* ========= 历史 ========= */
    .history {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 460px;
      overflow-y: auto;
      padding-right: 6px;
    }

    .history-item {
      background: rgba(0, 0, 0, 0.18);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--r-md);
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: fade-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) backwards;
      position: relative;
    }

    .history-item:hover {
      background: linear-gradient(135deg, rgba(236,72,153,0.08), rgba(99,102,241,0.08));
      border-color: rgba(168,85,247,0.3);
      transform: translateX(3px);
    }

    .history-item .text {
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 96px;
      overflow: hidden;
      color: var(--text-soft);
    }

    .history-item .time {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .device-tag {
      font-size: 10px;
      padding: 3px 9px;
      border-radius: var(--r-pill);
      background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(168,85,247,0.2));
      border: 1px solid rgba(168,85,247,0.2);
      color: var(--text-soft);
      letter-spacing: 0.3px;
      font-weight: 600;
    }

    .device-tag.remote {
      background: linear-gradient(135deg, rgba(6,182,212,0.2), rgba(16,185,129,0.2));
      border-color: rgba(6,182,212,0.25);
    }

    .history-empty {
      text-align: center;
      color: var(--text-muted);
      padding: 40px 14px;
      font-size: 14px;
      border: 1px dashed rgba(255,255,255,0.06);
      border-radius: var(--r-md);
      font-style: italic;
    }

    /* ========= Toast ========= */
    .toast-wrap {
      position: fixed;
      left: 50%;
      bottom: 40px;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
      z-index: 9999;
    }

    .toast {
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--glass-border);
      color: var(--text);
      padding: 14px 28px;
      border-radius: var(--r-pill);
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 20px 60px -15px rgba(0,0,0,0.6);
      animation: toast-in 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-width: 90vw;
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toast.success {
      border-color: rgba(16,185,129,0.3);
      background: rgba(16,185,129,0.12);
      box-shadow: 0 20px 60px -15px rgba(16,185,129,0.3);
    }
    .toast.error {
      border-color: rgba(244,63,94,0.3);
      background: rgba(244,63,94,0.12);
      box-shadow: 0 20px 60px -15px rgba(244,63,94,0.3);
    }

    @keyframes toast-in {
      from { transform: translateY(40px) scale(0.9); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    /* ========= 滚动条 ========= */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: var(--r-pill);
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.22);
      background-clip: padding-box;
    }

    /* ========= Footer ========= */
    footer {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      padding: 14px 0;
      font-weight: 500;
      animation: fade-up 1s 0.4s cubic-bezier(0.16, 1, 0.3, 1) backwards;
    }

    footer a {
      color: var(--text-soft);
      text-decoration: none;
      transition: color 0.2s;
      border-bottom: 1px dotted rgba(148,163,184,0.4);
    }
    footer a:hover {
      color: var(--primary-1);
      border-bottom-color: var(--primary-1);
    }

    /* 照片署名小标 */
    .photo-credit {
      position: fixed;
      bottom: 12px;
      right: 12px;
      font-size: 10px;
      color: rgba(255,255,255,0.55);
      z-index: 100;
      pointer-events: none;
      background: rgba(0,0,0,0.35);
      padding: 5px 12px;
      border-radius: var(--r-pill);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      font-weight: 500;
      letter-spacing: 0.3px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    @media (max-width: 640px) {
      .photo-credit { display: none; }
    }
  </style>
</head>
<body>
  <!-- 背景照片轮播（双层交叉淑变） -->
  <div class="bg-stage" aria-hidden="true">
    <div class="bg-layer" id="bg-1"></div>
    <div class="bg-layer" id="bg-2"></div>
  </div>
  <!-- 漂浮极光光球 -->
  <div class="orb orb-1" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>
  <div class="orb orb-3" aria-hidden="true"></div>
  <!-- 暗角叠层（增强可读性） -->
  <div class="bg-overlay" aria-hidden="true"></div>

  <div class="wrap">
    <header>
      <div class="logo">
        <div class="logo-mark">传</div>
        <span class="logo-text">文字传</span>
      </div>
      <div class="status" id="status" title="正在与云端服务器进行实时通信">
        <span class="dot loading" id="status-dot"></span>
        <span id="status-text">连接中…</span>
      </div>
    </header>

    <div class="grid">
      <!-- 接收区 -->
      <section class="card">
        <h3 class="card-title">
          <span class="title-text">
            <span class="title-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </span>
            收到的文字
          </span>
          <span class="meta" id="received-time"></span>
        </h3>
        <div id="received-text" class="received-text empty">等待消息…</div>
        <div class="btn-row">
          <button class="btn primary" id="btn-copy" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            一键复制
          </button>
          <button class="btn" id="btn-refresh" title="强制刷新拉取最新数据">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            刷新
          </button>
        </div>
      </section>

      <!-- 发送区 -->
      <section class="card">
        <h3 class="card-title">
          <span class="title-text">
            <span class="title-icon" style="background:linear-gradient(135deg, rgba(6,182,212,0.25), rgba(16,185,129,0.25)); color:var(--primary-4)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </span>
            发送文字
          </span>
          <span class="meta">Ctrl + Enter 发送</span>
        </h3>
        <div class="editor-wrapper">
          <textarea id="editor" class="editor" placeholder="在这里输入文字,或点击下方直接粘贴并发送..." maxlength="20000"></textarea>
          <span class="char-count" id="char-count">0 / 20k</span>
        </div>
        <div class="btn-row">
          <button class="btn primary" id="btn-send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            发送
          </button>
          <button class="btn" id="btn-paste-send" title="读取剪贴板文字并直接发送">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
            粘贴发送
          </button>
          <button class="btn ghost" id="btn-clear-editor" title="清空输入框">清空</button>
        </div>
      </section>

      <!-- 历史 -->
      <section class="card span-full">
        <h3 class="card-title">
          <span class="title-text">
            <span class="title-icon" style="background:linear-gradient(135deg, rgba(168,85,247,0.25), rgba(6,182,212,0.25)); color:var(--primary-2)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </span>
            历史记录
          </span>
          <button class="btn ghost danger" id="btn-clear-history" style="padding:6px 14px;font-size:12px;height:32px;flex:none;min-width:auto;">清空历史</button>
        </h3>
        <div class="history" id="history">
          <div class="history-empty">暂无历史</div>
        </div>
      </section>
    </div>

    <footer>
      <p>文字传 · 云端实时同步 · PWA 已启用 · <a href="https://github.com/linlong5201314/wzc-transfer" target="_blank" rel="noopener">GitHub</a></p>
    </footer>
  </div>

  <div class="toast-wrap" id="toast-wrap"></div>

  <div class="photo-credit" id="photo-credit">📷 实时轮播 · 多源高清风景</div>

  <script>
    // ============================================================
    // 背景照片轮播：120+ 张丝滑模糊互切（多源容灾）
    // ============================================================
    (function () {
      const CONFIG = {
        count: 120,
        showMs: 4000,        // ⏱ 单张展示时长(4 秒,动感)
        sourceTimeoutMs: 3500 // 单源加载超时,超时后换下一源
      };

      // 多个图源 - 按可用性从优到劣排列
      // 每个函数接收一个唯一种子 seed,返回一张图的 URL
      const SOURCES = [
        // 国内 CDN: 高清风景照片(几千张池),China-friendly
        (seed) => `https://t.alcy.cc/fj/?_=${seed}`,
        // 国内 CDN: Bing 必应每日壁纸(每张种子返回当时收录的一张)
        (seed) => `https://api.dujin.org/bing/1920.php?_=${seed}`,
        // 国际 CDN: Picsum 兜底(国内不稳)
        (seed) => `https://picsum.photos/seed/wzc${seed}/1920/1080`
      ];

      const layers = [
        document.getElementById('bg-1'),
        document.getElementById('bg-2')
      ];
      let active = 0, idx = 0;

      // 打乱 1..count 的种子顺序 (Fisher–Yates)
      const order = Array.from({ length: CONFIG.count }, (_, i) => i + 1);
      for (let i = order.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [order[i], order[j]] = [order[j], order[i]];
      }

      // 加载单张图,带超时控制
      function preloadOne(url) {
        return new Promise((resolve) => {
          const img = new Image();
          let done = false;
          const finish = (val) => { if (!done) { done = true; resolve(val); } };
          img.onload = () => finish(url);
          img.onerror = () => finish(null);
          img.src = url;
          setTimeout(() => finish(null), CONFIG.sourceTimeoutMs);
        });
      }

      // 依次尝试多个图源,直到一个成功
      async function loadPhoto(seed) {
        for (const src of SOURCES) {
          const url = await preloadOne(src(seed));
          if (url) return url;
        }
        return null;
      }

      async function swap() {
        const nextSeed = order[(idx + 1) % order.length];
        const url = await loadPhoto(nextSeed);
        if (!url) { idx = (idx + 1) % order.length; return; }

        const next = (active + 1) % 2;
        layers[next].style.backgroundImage = `url("${url}")`;
        // 强制重排后再加上 active 以触发 transition
        void layers[next].offsetHeight;
        layers[next].classList.add('active');
        layers[active].classList.remove('active');
        active = next;
        idx = (idx + 1) % order.length;

        // 提前预加载下一张以保证丝滑过渡
        loadPhoto(order[(idx + 1) % order.length]);
      }

      async function init() {
        const url = await loadPhoto(order[0]);
        if (url) {
          layers[0].style.backgroundImage = `url("${url}")`;
          layers[0].classList.add('active');
        }
        loadPhoto(order[1]); // 预加载第二张
        setInterval(swap, CONFIG.showMs);
      }

      init();
    })();

    // ============================================================
    // 按钮鼠标光晕跟随 (Apple Vision Pro 式)
    // ============================================================
    document.querySelectorAll('.btn').forEach((btn) => {
      btn.addEventListener('mousemove', (e) => {
        const r = btn.getBoundingClientRect();
        btn.style.setProperty('--mx', `${e.clientX - r.left}px`);
        btn.style.setProperty('--my', `${e.clientY - r.top}px`);
      });
    });

    // ============================================================
    // 工具函数
    // ============================================================
    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);

    function toast(msg, type = '') {
      const el = document.createElement('div');
      el.className = 'toast ' + type;
      el.textContent = msg;
      $('#toast-wrap').appendChild(el);
      setTimeout(() => {
        el.style.transition = 'opacity 0.3s';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 300);
      }, 1800);
    }

    function formatTime(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      const now = new Date();
      const diff = now - d;
      if (diff < 60_000) return '刚刚';
      if (diff < 3600_000) return Math.floor(diff / 60_000) + ' 分钟前';
      const sameDay = d.toDateString() === now.toDateString();
      const hm = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
      if (sameDay) return hm;
      return (d.getMonth()+1) + '/' + d.getDate() + ' ' + hm;
    }

    function deviceLabel() {
      const ua = navigator.userAgent;
      if (/Android/i.test(ua)) return '📱 安卓';
      if (/iPhone|iPad|iPod/i.test(ua)) return '📱 iOS';
      if (/Windows/i.test(ua)) return '💻 Windows';
      if (/Mac/i.test(ua)) return '💻 Mac';
      return '💻 电脑';
    }

    // 生成稳定的设备 ID
    function getDeviceId() {
      let id = localStorage.getItem('deviceId');
      if (!id) {
        id = 'd_' + Math.random().toString(36).slice(2, 10) + '_' + Date.now().toString(36);
        localStorage.setItem('deviceId', id);
      }
      return id;
    }

    const DEVICE_ID = getDeviceId();
    const DEVICE_LABEL = deviceLabel();

    // ============================================================
    // 状态管理
    // ============================================================
    const state = {
      lastTimestamp: 0,
      latest: null,
      online: false,
      polling: null,
      pollInterval: 2500, // 可见时 2.5 秒
      sleepInterval: 30_000, // 隐藏时 30 秒
    };

    function setStatus(kind, text) {
      const dot = $('#status-dot');
      dot.className = 'dot ' + kind;
      $('#status-text').textContent = text;
    }

    // ============================================================
    // API 调用
    // ============================================================
    async function apiGet(path) {
      const res = await fetch(path, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    }

    async function apiPost(path, body) {
      const res = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body || {})
      });
      if (!res.ok) {
        let msg = 'HTTP ' + res.status;
        try { const j = await res.json(); if (j.error) msg = j.error; } catch {}
        throw new Error(msg);
      }
      return res.json();
    }

    // ============================================================
    // 接收 & 渲染
    // ============================================================
    function renderReceived(msg) {
      const box = $('#received-text');
      const timeEl = $('#received-time');
      const btnCopy = $('#btn-copy');

      if (!msg || !msg.text) {
        box.className = 'received-text empty';
        box.textContent = '等待消息…';
        timeEl.textContent = '';
        btnCopy.disabled = true;
        return;
      }

      const isNew = msg.timestamp > state.lastTimestamp;
      box.className = 'received-text' + (isNew ? ' flash' : '');
      box.textContent = msg.text;
      const fromSelf = msg.senderId === DEVICE_ID;
      timeEl.textContent = formatTime(msg.timestamp) + (fromSelf ? ' · 来自本机' : '');
      btnCopy.disabled = false;
      state.latest = msg;
      if (isNew) state.lastTimestamp = msg.timestamp;
    }

    async function pollLatest() {
      try {
        const url = state.lastTimestamp
          ? '/api/latest?since=' + state.lastTimestamp
          : '/api/latest';
        const data = await apiGet(url);
        if (data.message) {
          renderReceived(data.message);
        } else if (!state.latest) {
          // 初始也没消息
          renderReceived(null);
        }
        if (!state.online) {
          state.online = true;
          setStatus('online', '已连接');
        }
      } catch (err) {
        state.online = false;
        setStatus('offline', '连接失败');
        console.warn('poll failed:', err);
      }
    }

    function startPolling() {
      stopPolling();
      const tick = async () => {
        await pollLatest();
        const interval = document.hidden ? state.sleepInterval : state.pollInterval;
        state.polling = setTimeout(tick, interval);
      };
      tick();
    }
    function stopPolling() {
      if (state.polling) { clearTimeout(state.polling); state.polling = null; }
    }

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        // 切回来立即拉一次
        stopPolling();
        startPolling();
      }
    });

    // ============================================================
    // 发送
    // ============================================================
    async function sendText(text) {
      if (!text || !text.trim()) {
        toast('内容不能为空', 'error');
        return false;
      }
      const btnSend = $('#btn-send');
      const btnPaste = $('#btn-paste-send');
      btnSend.disabled = true;
      btnPaste.disabled = true;
      try {
        const data = await apiPost('/api/send', { text, senderId: DEVICE_ID });
        if (data.message) renderReceived(data.message);
        loadHistory();
        toast('已发送', 'success');
        return true;
      } catch (err) {
        toast('发送失败: ' + err.message, 'error');
        return false;
      } finally {
        btnSend.disabled = false;
        btnPaste.disabled = false;
      }
    }

    // ============================================================
    // 剪贴板
    // ============================================================
    async function copyToClipboard(text) {
      if (!text) return false;
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return true;
        }
        // 后备方案
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand('copy');
        document.body.removeChild(ta);
        return ok;
      } catch (e) {
        console.warn('copy failed:', e);
        return false;
      }
    }

    async function readFromClipboard() {
      try {
        if (navigator.clipboard && navigator.clipboard.readText && window.isSecureContext) {
          return await navigator.clipboard.readText();
        }
        throw new Error('当前浏览器不支持读取剪贴板,请在文本框中手动粘贴');
      } catch (e) {
        throw e;
      }
    }

    // ============================================================
    // 历史
    // ============================================================
    async function loadHistory() {
      try {
        const data = await apiGet('/api/history');
        renderHistory(data.messages || []);
      } catch (err) {
        console.warn('history failed:', err);
      }
    }

    function renderHistory(messages) {
      const box = $('#history');
      if (!messages.length) {
        box.innerHTML = '<div class="history-empty">暂无历史</div>';
        return;
      }
      box.innerHTML = '';
      messages.forEach(m => {
        const item = document.createElement('div');
        item.className = 'history-item';
        const text = document.createElement('div');
        text.className = 'text';
        text.textContent = m.text;
        if (m.text.length > 200) text.classList.add('long');
        const time = document.createElement('div');
        time.className = 'time';
        const fromSelf = m.senderId === DEVICE_ID;
        time.innerHTML = `<span>${formatTime(m.timestamp)}</span> <span class="device-tag${fromSelf ? '' : ' remote'}">${fromSelf ? '本机' : '远端'}</span>`;
        item.appendChild(text);
        item.appendChild(time);
        item.title = '点击复制';
        item.onclick = async () => {
          const ok = await copyToClipboard(m.text);
          toast(ok ? '已复制到剪贴板' : '复制失败', ok ? 'success' : 'error');
        };
        box.appendChild(item);
      });
    }

    // ============================================================
    // 事件绑定
    // ============================================================
    const editor = $('#editor');
    const charCount = $('#char-count');
    
    function updateCharCount() {
      const len = editor.value.length;
      charCount.textContent = `${len} / 20k`;
      if (len >= 19000) {
        charCount.style.color = 'var(--danger)';
      } else {
        charCount.style.color = '';
      }
    }

    editor.addEventListener('input', updateCharCount);

    $('#received-text').ondblclick = async () => {
      if (!state.latest) return;
      const ok = await copyToClipboard(state.latest.text);
      toast(ok ? '双击复制成功' : '复制失败', ok ? 'success' : 'error');
    };

    $('#btn-copy').onclick = async () => {
      if (!state.latest) return;
      const btn = $('#btn-copy');
      const originalHTML = btn.innerHTML;
      const ok = await copyToClipboard(state.latest.text);
      
      if (ok) {
        toast('已复制到剪贴板', 'success');
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--success)"><polyline points="20 6 9 17 4 12"/></svg> 已复制`;
        btn.style.borderColor = 'var(--success)';
        setTimeout(() => {
          btn.innerHTML = originalHTML;
          btn.style.borderColor = '';
        }, 1500);
      } else {
        toast('复制失败', 'error');
      }
    };

    $('#btn-refresh').onclick = async () => {
      setStatus('loading', '刷新中…');
      await pollLatest();
      await loadHistory();
    };

    $('#btn-send').onclick = async () => {
      const ed = $('#editor');
      const text = ed.value;
      const ok = await sendText(text);
      if (ok) {
        ed.value = '';
        updateCharCount();
      }
    };

    $('#btn-paste-send').onclick = async () => {
      try {
        const text = await readFromClipboard();
        if (!text) { toast('剪贴板为空', 'error'); return; }
        await sendText(text);
      } catch (e) {
        toast(e.message || '读取剪贴板失败', 'error');
      }
    };

    $('#btn-clear-editor').onclick = () => {
      $('#editor').value = '';
      updateCharCount();
    };

    $('#btn-clear-history').onclick = async () => {
      if (!confirm('确定清空所有消息和历史?(双方设备都会清空)')) return;
      try {
        await apiPost('/api/clear');
        state.lastTimestamp = 0;
        state.latest = null;
        renderReceived(null);
        renderHistory([]);
        toast('已清空', 'success');
      } catch (e) {
        toast('清空失败: ' + e.message, 'error');
      }
    };

    // Ctrl/Cmd + Enter 发送
    $('#editor').addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        $('#btn-send').click();
      }
    });

    // ============================================================
    // 启动
    // ============================================================
    setStatus('loading', '连接中…');
    startPolling();
    loadHistory();

    // 注册 Service Worker (PWA 离线缓存)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => console.warn('SW reg failed', err));
      });
    }
  </script>
</body>
</html>
