<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1020" />
  <meta name="description" content="电脑与手机之间一键互传文字" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="文字传" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="icon" href="/icon-192.png" sizes="192x192" type="image/png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <title>文字传 · 电脑手机互传</title>
  <style>
    :root {
      --bg: #070913;
      --bg-glow-1: #1a1c3d;
      --bg-glow-2: #21153b;
      --card: rgba(15, 18, 36, 0.75);
      --card-hover: rgba(22, 26, 48, 0.85);
      --card-active: rgba(30, 35, 66, 0.95);
      --border: rgba(99, 102, 241, 0.16);
      --border-hover: rgba(99, 102, 241, 0.3);
      --border-focus: rgba(99, 102, 241, 0.5);
      --text: #f3f4f6;
      --text-dim: #94a3b8;
      --text-muted: #64748b;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --primary-light: #818cf8;
      --accent: #a855f7;
      --accent-hover: #9333ea;
      --success: #10b981;
      --success-bg: rgba(16, 185, 129, 0.1);
      --danger: #f43f5e;
      --danger-bg: rgba(244, 63, 94, 0.1);
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 10px;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
      --shadow-md: 0 10px 30px rgba(0, 0, 0, 0.35);
      --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.5);
      --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100vh;
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    body {
      background-image: 
        radial-gradient(circle at 10% 0%, var(--bg-glow-1) 0%, transparent 40%),
        radial-gradient(circle at 90% 85%, var(--bg-glow-2) 0%, transparent 45%),
        radial-gradient(circle at 50% 50%, #070913 0%, #030408 100%);
      background-attachment: fixed;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .wrap {
      width: 100%;
      max-width: 800px;
      padding: 20px 20px 100px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* 顶部导航栏 */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 6px;
      background: rgba(15, 18, 36, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: var(--radius-md);
      border: 1px solid rgba(255, 255, 255, 0.03);
      box-shadow: var(--shadow-sm);
      margin-bottom: 8px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      font-size: 20px;
      background: linear-gradient(135deg, var(--text) 30%, var(--text-dim) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      display: grid;
      place-items: center;
      color: #ffffff;
      font-size: 18px;
      font-weight: 900;
      -webkit-text-fill-color: #ffffff; /* 重置渐变字 */
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.35);
      position: relative;
      overflow: hidden;
    }

    .logo-mark::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: 0.5s;
    }

    header:hover .logo-mark::before {
      left: 100%;
      transition: 0.8s ease-in-out;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      padding: 6px 14px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 999px;
      transition: all 0.3s ease;
    }

    .status:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--border-hover);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .dot.online {
      background: var(--success);
      box-shadow: 0 0 12px var(--success), 0 0 4px var(--success);
      transform: scale(1.1);
    }

    .dot.offline {
      background: var(--danger);
      box-shadow: 0 0 12px var(--danger);
    }

    .dot.loading {
      background: var(--primary-light);
      box-shadow: 0 0 12px var(--primary-light);
      animation: pulse 1.2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.25); opacity: 1; }
    }

    /* 主网格布局 (在大屏时左右两栏) */
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 768px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }
      .span-full {
        grid-column: span 2;
      }
    }

    /* 模块卡片 */
    .card {
      background: var(--card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-md);
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card:hover {
      transform: translateY(-4px);
      background: var(--card-hover);
      border-color: var(--border-hover);
      box-shadow: var(--shadow-lg), 0 0 25px rgba(99, 102, 241, 0.05);
    }

    .card-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.5px;
    }

    .card-title .title-text {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title .meta {
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 500;
    }

    /* 文本展示区域 */
    .received-text {
      min-height: 120px;
      max-height: 320px;
      overflow-y: auto;
      padding: 16px;
      background: rgba(3, 4, 8, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: var(--radius-md);
      font-size: 16px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
      transition: all 0.3s ease;
    }

    .received-text.empty {
      color: var(--text-muted);
      font-style: italic;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      border: 1px dashed var(--border);
    }

    .received-text.flash {
      animation: flash-glow 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    @keyframes flash-glow {
      0% { 
        background: rgba(99, 102, 241, 0.25);
        border-color: var(--primary);
        box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
      }
      100% { 
        background: rgba(3, 4, 8, 0.4);
        border-color: rgba(255, 255, 255, 0.03);
        box-shadow: none;
      }
    }

    /* 输入框编辑器 */
    .editor-wrapper {
      position: relative;
      width: 100%;
    }

    textarea.editor {
      width: 100%;
      min-height: 120px;
      max-height: 320px;
      padding: 16px;
      padding-bottom: 36px; /* 为字数留出空间 */
      background: rgba(3, 4, 8, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: var(--radius-md);
      color: var(--text);
      font-size: 16px;
      line-height: 1.7;
      font-family: inherit;
      resize: vertical;
      outline: none;
      transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    textarea.editor:focus {
      border-color: var(--border-focus);
      background: rgba(3, 4, 8, 0.6);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.1), inset 0 0 10px rgba(0,0,0,0.3);
    }

    textarea.editor::placeholder {
      color: var(--text-muted);
    }

    .char-count {
      position: absolute;
      right: 12px;
      bottom: 12px;
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      pointer-events: none;
      transition: color 0.2s;
    }
    textarea.editor:focus + .char-count {
      color: var(--text-dim);
    }

    /* 按钮组 */
    .btn-row {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .btn {
      flex: 1;
      height: 48px;
      padding: 0 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.15);
      user-select: none;
      outline: none;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--border-hover);
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none !important;
      background: rgba(255, 255, 255, 0.01) !important;
      border-color: var(--border) !important;
    }

    /* 主操作按钮 (发送、复制) */
    .btn.primary {
      background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%);
      border: none;
      color: #ffffff;
      -webkit-text-fill-color: #ffffff;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.35);
    }

    .btn.primary:hover {
      background: linear-gradient(135deg, var(--primary-light) 0%, #8b5cf6 100%);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5), 0 0 10px rgba(168, 85, 247, 0.2);
    }

    .btn.danger {
      color: var(--danger);
      border-color: rgba(244, 63, 94, 0.15);
      background: var(--danger-bg);
    }

    .btn.danger:hover {
      background: rgba(244, 63, 94, 0.18);
      border-color: rgba(244, 63, 94, 0.3);
    }

    .btn.ghost {
      background: transparent;
      border-color: transparent;
      color: var(--text-dim);
      flex: 0;
      min-width: 60px;
    }

    .btn.ghost:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.03);
    }

    .btn svg {
      width: 18px;
      height: 18px;
      transition: transform 0.3s;
    }

    .btn:hover svg {
      transform: scale(1.1);
    }

    /* 历史记录 */
    .history {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 400px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .history-item {
      background: rgba(3, 4, 8, 0.25);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item:hover {
      background: rgba(99, 102, 241, 0.05);
      border-color: var(--border-hover);
      transform: scale(1.01);
    }

    .history-item .text {
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 96px;
      overflow: hidden;
      color: var(--text);
    }

    .history-item .text.long::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: 32px;
      height: 30px;
      background: linear-gradient(transparent, rgba(15, 18, 36, 0.95));
      pointer-events: none;
    }

    .history-item .time {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .history-item .device-tag {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.02);
      color: var(--text-dim);
    }

    .history-empty {
      text-align: center;
      color: var(--text-muted);
      padding: 30px 14px;
      font-size: 14px;
      border: 1px dashed rgba(255, 255, 255, 0.03);
      border-radius: var(--radius-md);
    }

    /* Toast 弹出提示 */
    .toast-wrap {
      position: fixed;
      left: 50%;
      bottom: 40px;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
      z-index: 9999;
    }

    .toast {
      background: rgba(13, 16, 32, 0.85);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: var(--shadow-lg), 0 10px 40px rgba(0,0,0,0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      animation: toast-slide-in 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      max-width: 90vw;
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast.success {
      border-color: rgba(16, 185, 129, 0.3);
      background: rgba(16, 185, 129, 0.1);
      box-shadow: 0 10px 30px rgba(16, 185, 129, 0.1);
    }

    .toast.error {
      border-color: rgba(244, 63, 94, 0.3);
      background: rgba(244, 63, 94, 0.1);
      box-shadow: 0 10px 30px rgba(244, 63, 94, 0.1);
    }

    @keyframes toast-slide-in {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* 滚动条美化 */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 99px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    footer {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      padding: 10px 0;
      font-weight: 500;
    }

    footer a {
      color: var(--primary-light);
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover {
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">
        <div class="logo-mark">传</div>
        <span>文字传</span>
      </div>
      <div class="status" id="status" title="正在与云端服务器进行实时通信">
        <span class="dot loading" id="status-dot"></span>
        <span id="status-text">连接中…</span>
      </div>
    </header>

    <div class="grid">
      <!-- 接收区 -->
      <section class="card">
        <h3 class="card-title">
          <span class="title-text">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;color:var(--primary-light)"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            📥 收到的文字
          </span>
          <span class="meta" id="received-time"></span>
        </h3>
        <div id="received-text" class="received-text empty">等待消息…</div>
        <div class="btn-row">
          <button class="btn primary" id="btn-copy" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            一键复制
          </button>
          <button class="btn" id="btn-refresh" title="强制刷新拉取最新数据">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            刷新
          </button>
        </div>
      </section>

      <!-- 发送区 -->
      <section class="card">
        <h3 class="card-title">
          <span class="title-text">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;color:var(--accent)"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            📤 发送文字
          </span>
          <span class="meta" style="font-size:11px;">Ctrl + Enter 发送</span>
        </h3>
        <div class="editor-wrapper">
          <textarea id="editor" class="editor" placeholder="在这里输入文字,或点击下方直接粘贴并发送..." maxlength="20000"></textarea>
          <span class="char-count" id="char-count">0 / 20k</span>
        </div>
        <div class="btn-row">
          <button class="btn primary" id="btn-send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            发送
          </button>
          <button class="btn" id="btn-paste-send" title="读取剪贴板文字并直接发送">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
            粘贴发送
          </button>
          <button class="btn ghost" id="btn-clear-editor" title="清空输入框">清空</button>
        </div>
      </section>

      <!-- 历史 -->
      <section class="card span-full">
        <h3 class="card-title">
          <span class="title-text">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;color:var(--text-dim)"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            🕒 历史记录
          </span>
          <button class="btn ghost danger" id="btn-clear-history" style="padding:6px 12px;font-size:12px;height:32px;flex:none;min-width:auto;">清空历史</button>
        </h3>
        <div class="history" id="history">
          <div class="history-empty">暂无历史</div>
        </div>
      </section>
    </div>

    <footer>
      <p>极简文字传 · 已装载 PWA 服务 · <a href="https://github.com/linlong5201314/wzc-transfer" target="_blank" rel="noopener">GitHub</a></p>
    </footer>
  </div>

  <div class="toast-wrap" id="toast-wrap"></div>

  <script>
    // ============================================================
    // 工具函数
    // ============================================================
    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);

    function toast(msg, type = '') {
      const el = document.createElement('div');
      el.className = 'toast ' + type;
      el.textContent = msg;
      $('#toast-wrap').appendChild(el);
      setTimeout(() => {
        el.style.transition = 'opacity 0.3s';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 300);
      }, 1800);
    }

    function formatTime(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      const now = new Date();
      const diff = now - d;
      if (diff < 60_000) return '刚刚';
      if (diff < 3600_000) return Math.floor(diff / 60_000) + ' 分钟前';
      const sameDay = d.toDateString() === now.toDateString();
      const hm = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
      if (sameDay) return hm;
      return (d.getMonth()+1) + '/' + d.getDate() + ' ' + hm;
    }

    function deviceLabel() {
      const ua = navigator.userAgent;
      if (/Android/i.test(ua)) return '📱 安卓';
      if (/iPhone|iPad|iPod/i.test(ua)) return '📱 iOS';
      if (/Windows/i.test(ua)) return '💻 Windows';
      if (/Mac/i.test(ua)) return '💻 Mac';
      return '💻 电脑';
    }

    // 生成稳定的设备 ID
    function getDeviceId() {
      let id = localStorage.getItem('deviceId');
      if (!id) {
        id = 'd_' + Math.random().toString(36).slice(2, 10) + '_' + Date.now().toString(36);
        localStorage.setItem('deviceId', id);
      }
      return id;
    }

    const DEVICE_ID = getDeviceId();
    const DEVICE_LABEL = deviceLabel();

    // ============================================================
    // 状态管理
    // ============================================================
    const state = {
      lastTimestamp: 0,
      latest: null,
      online: false,
      polling: null,
      pollInterval: 2500, // 可见时 2.5 秒
      sleepInterval: 30_000, // 隐藏时 30 秒
    };

    function setStatus(kind, text) {
      const dot = $('#status-dot');
      dot.className = 'dot ' + kind;
      $('#status-text').textContent = text;
    }

    // ============================================================
    // API 调用
    // ============================================================
    async function apiGet(path) {
      const res = await fetch(path, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    }

    async function apiPost(path, body) {
      const res = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body || {})
      });
      if (!res.ok) {
        let msg = 'HTTP ' + res.status;
        try { const j = await res.json(); if (j.error) msg = j.error; } catch {}
        throw new Error(msg);
      }
      return res.json();
    }

    // ============================================================
    // 接收 & 渲染
    // ============================================================
    function renderReceived(msg) {
      const box = $('#received-text');
      const timeEl = $('#received-time');
      const btnCopy = $('#btn-copy');

      if (!msg || !msg.text) {
        box.className = 'received-text empty';
        box.textContent = '等待消息…';
        timeEl.textContent = '';
        btnCopy.disabled = true;
        return;
      }

      const isNew = msg.timestamp > state.lastTimestamp;
      box.className = 'received-text' + (isNew ? ' flash' : '');
      box.textContent = msg.text;
      const fromSelf = msg.senderId === DEVICE_ID;
      timeEl.textContent = formatTime(msg.timestamp) + (fromSelf ? ' · 来自本机' : '');
      btnCopy.disabled = false;
      state.latest = msg;
      if (isNew) state.lastTimestamp = msg.timestamp;
    }

    async function pollLatest() {
      try {
        const url = state.lastTimestamp
          ? '/api/latest?since=' + state.lastTimestamp
          : '/api/latest';
        const data = await apiGet(url);
        if (data.message) {
          renderReceived(data.message);
        } else if (!state.latest) {
          // 初始也没消息
          renderReceived(null);
        }
        if (!state.online) {
          state.online = true;
          setStatus('online', '已连接');
        }
      } catch (err) {
        state.online = false;
        setStatus('offline', '连接失败');
        console.warn('poll failed:', err);
      }
    }

    function startPolling() {
      stopPolling();
      const tick = async () => {
        await pollLatest();
        const interval = document.hidden ? state.sleepInterval : state.pollInterval;
        state.polling = setTimeout(tick, interval);
      };
      tick();
    }
    function stopPolling() {
      if (state.polling) { clearTimeout(state.polling); state.polling = null; }
    }

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        // 切回来立即拉一次
        stopPolling();
        startPolling();
      }
    });

    // ============================================================
    // 发送
    // ============================================================
    async function sendText(text) {
      if (!text || !text.trim()) {
        toast('内容不能为空', 'error');
        return false;
      }
      const btnSend = $('#btn-send');
      const btnPaste = $('#btn-paste-send');
      btnSend.disabled = true;
      btnPaste.disabled = true;
      try {
        const data = await apiPost('/api/send', { text, senderId: DEVICE_ID });
        if (data.message) renderReceived(data.message);
        loadHistory();
        toast('已发送', 'success');
        return true;
      } catch (err) {
        toast('发送失败: ' + err.message, 'error');
        return false;
      } finally {
        btnSend.disabled = false;
        btnPaste.disabled = false;
      }
    }

    // ============================================================
    // 剪贴板
    // ============================================================
    async function copyToClipboard(text) {
      if (!text) return false;
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return true;
        }
        // 后备方案
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand('copy');
        document.body.removeChild(ta);
        return ok;
      } catch (e) {
        console.warn('copy failed:', e);
        return false;
      }
    }

    async function readFromClipboard() {
      try {
        if (navigator.clipboard && navigator.clipboard.readText && window.isSecureContext) {
          return await navigator.clipboard.readText();
        }
        throw new Error('当前浏览器不支持读取剪贴板,请在文本框中手动粘贴');
      } catch (e) {
        throw e;
      }
    }

    // ============================================================
    // 历史
    // ============================================================
    async function loadHistory() {
      try {
        const data = await apiGet('/api/history');
        renderHistory(data.messages || []);
      } catch (err) {
        console.warn('history failed:', err);
      }
    }

    function renderHistory(messages) {
      const box = $('#history');
      if (!messages.length) {
        box.innerHTML = '<div class="history-empty">暂无历史</div>';
        return;
      }
      box.innerHTML = '';
      messages.forEach(m => {
        const item = document.createElement('div');
        item.className = 'history-item';
        const text = document.createElement('div');
        text.className = 'text';
        text.textContent = m.text;
        if (m.text.length > 200) text.classList.add('long');
        const time = document.createElement('div');
        time.className = 'time';
        const fromSelf = m.senderId === DEVICE_ID;
        time.innerHTML = `<span>${formatTime(m.timestamp)}</span> <span class="device-tag">${fromSelf ? '本机' : '远端'}</span>`;
        item.appendChild(text);
        item.appendChild(time);
        item.title = '点击复制';
        item.onclick = async () => {
          const ok = await copyToClipboard(m.text);
          toast(ok ? '已复制到剪贴板' : '复制失败', ok ? 'success' : 'error');
        };
        box.appendChild(item);
      });
    }

    // ============================================================
    // 事件绑定
    // ============================================================
    const editor = $('#editor');
    const charCount = $('#char-count');
    
    function updateCharCount() {
      const len = editor.value.length;
      charCount.textContent = `${len} / 20k`;
      if (len >= 19000) {
        charCount.style.color = 'var(--danger)';
      } else {
        charCount.style.color = '';
      }
    }

    editor.addEventListener('input', updateCharCount);

    $('#received-text').ondblclick = async () => {
      if (!state.latest) return;
      const ok = await copyToClipboard(state.latest.text);
      toast(ok ? '双击复制成功' : '复制失败', ok ? 'success' : 'error');
    };

    $('#btn-copy').onclick = async () => {
      if (!state.latest) return;
      const btn = $('#btn-copy');
      const originalHTML = btn.innerHTML;
      const ok = await copyToClipboard(state.latest.text);
      
      if (ok) {
        toast('已复制到剪贴板', 'success');
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--success)"><polyline points="20 6 9 17 4 12"/></svg> 已复制`;
        btn.style.borderColor = 'var(--success)';
        setTimeout(() => {
          btn.innerHTML = originalHTML;
          btn.style.borderColor = '';
        }, 1500);
      } else {
        toast('复制失败', 'error');
      }
    };

    $('#btn-refresh').onclick = async () => {
      setStatus('loading', '刷新中…');
      await pollLatest();
      await loadHistory();
    };

    $('#btn-send').onclick = async () => {
      const ed = $('#editor');
      const text = ed.value;
      const ok = await sendText(text);
      if (ok) {
        ed.value = '';
        updateCharCount();
      }
    };

    $('#btn-paste-send').onclick = async () => {
      try {
        const text = await readFromClipboard();
        if (!text) { toast('剪贴板为空', 'error'); return; }
        await sendText(text);
      } catch (e) {
        toast(e.message || '读取剪贴板失败', 'error');
      }
    };

    $('#btn-clear-editor').onclick = () => {
      $('#editor').value = '';
      updateCharCount();
    };

    $('#btn-clear-history').onclick = async () => {
      if (!confirm('确定清空所有消息和历史?(双方设备都会清空)')) return;
      try {
        await apiPost('/api/clear');
        state.lastTimestamp = 0;
        state.latest = null;
        renderReceived(null);
        renderHistory([]);
        toast('已清空', 'success');
      } catch (e) {
        toast('清空失败: ' + e.message, 'error');
      }
    };

    // Ctrl/Cmd + Enter 发送
    $('#editor').addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        $('#btn-send').click();
      }
    });

    // ============================================================
    // 启动
    // ============================================================
    setStatus('loading', '连接中…');
    startPolling();
    loadHistory();

    // 注册 Service Worker (PWA 离线缓存)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => console.warn('SW reg failed', err));
      });
    }
  </script>
</body>
</html>
