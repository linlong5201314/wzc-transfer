<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="电脑与手机之间一键互传文字" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="文字传" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="icon" href="/icon-192.png" sizes="192x192" type="image/png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <title>文字传 · 电脑手机互传</title>
  <style>
    :root {
      /* === Apple-inspired premium palette === */
      --bg-base: #000000;
      --bg-elevated: #1c1c1e;
      --bg-elevated-2: #2c2c2e;

      /* iOS System Blue (signature accent) */
      --accent: #0a84ff;
      --accent-light: #5ac8fa;
      --accent-darker: #0071e3;
      --accent-glow: rgba(10, 132, 255, 0.4);

      /* iOS System Colors */
      --success: #30d158;
      --danger: #ff453a;
      --warning: #ff9f0a;
      --indigo: #7d7aff;

      /* Glass materials — refined macOS-style vibrancy */
      --glass-bg: rgba(28, 28, 30, 0.58);
      --glass-bg-strong: rgba(44, 44, 46, 0.76);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-border-bright: rgba(255, 255, 255, 0.16);

      /* Text — Apple system gray levels */
      --text: #f5f5f7;
      --text-soft: rgba(235, 235, 245, 0.85);
      --text-secondary: rgba(235, 235, 245, 0.62);
      --text-tertiary: rgba(235, 235, 245, 0.35);
      --text-quaternary: rgba(235, 235, 245, 0.18);

      /* Corner radius — iOS continuous-curve language */
      --r-xs: 8px;
      --r-sm: 12px;
      --r-md: 16px;
      --r-lg: 22px;
      --r-xl: 28px;
      --r-pill: 980px;

      --shadow-card: 0 12px 40px -8px rgba(0, 0, 0, 0.55), 0 0 0 0.5px rgba(255, 255, 255, 0.06);
      --shadow-button: 0 4px 16px -3px rgba(10, 132, 255, 0.5);

      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Inter", "Helvetica Neue", "PingFang SC", "HarmonyOS Sans SC", "Microsoft YaHei", system-ui, sans-serif;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring: cubic-bezier(0.34, 1.4, 0.64, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      min-height: 100vh;
      background: var(--bg-base);
      color: var(--text);
      font-family: var(--font);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body {
      position: relative;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      display: flex;
      flex-direction: column;
      align-items: center;
      letter-spacing: -0.01em;
      font-feature-settings: "ss01", "cv01", "cv11";
    }

    /* ========= 背景照片轮播（沉稳低调） ========= */
    .bg-stage {
      position: fixed;
      inset: 0;
      z-index: -3;
      overflow: hidden;
      /* 默认沉稳渐变（图片未加载时仍然好看） */
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(10, 132, 255, 0.10), transparent 60%),
        radial-gradient(ellipse 70% 50% at 50% 100%, rgba(90, 200, 250, 0.05), transparent 60%),
        linear-gradient(180deg, #000 0%, #0a0a0a 100%);
    }

    .bg-layer {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: blur(56px) saturate(105%) brightness(0.4);
      opacity: 0;
      transform: scale(1.2);
      transition: opacity 2.8s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: opacity, transform;
    }

    .bg-layer.active {
      opacity: 0.78;
      animation: ken-burns 22s ease-in-out infinite alternate;
    }

    @keyframes ken-burns {
      0%   { transform: scale(1.20) translate(0, 0); }
      100% { transform: scale(1.32) translate(-3%, -2%); }
    }

    /* ========= 极简单色辉光 ========= */
    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: -2;
      will-change: transform;
      mix-blend-mode: screen;
    }

    .orb-1 {
      width: 720px; height: 720px;
      background: radial-gradient(circle, rgba(10, 132, 255, 0.22), transparent 65%);
      filter: blur(80px);
      top: -20%; left: -12%;
      animation: drift-1 28s ease-in-out infinite;
    }
    .orb-2 {
      width: 560px; height: 560px;
      background: radial-gradient(circle, rgba(90, 200, 250, 0.14), transparent 65%);
      filter: blur(70px);
      bottom: -15%; right: -10%;
      animation: drift-2 32s ease-in-out infinite;
    }
    .orb-3 { display: none; }

    @keyframes drift-1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(80px, 60px) scale(1.08); }
    }
    @keyframes drift-2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-60px, -40px) scale(1.06); }
    }

    /* 暗角叠层 */
    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(ellipse at center, transparent 0%, rgba(0, 0, 0, 0.5) 100%),
        linear-gradient(180deg, transparent 55%, rgba(0, 0, 0, 0.45) 100%);
    }

    /* ========= 主布局 ========= */
    .wrap {
      width: 100%;
      max-width: 900px;
      padding: 28px 22px 110px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      position: relative;
      z-index: 1;
    }

    /* ========= 顶部导航栏 ========= */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px 13px 18px;
      background: var(--glass-bg);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 0.5px solid var(--glass-border);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-card);
      animation: fade-down 0.7s var(--ease-out) backwards;
    }

    @keyframes fade-down {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      font-size: 19px;
      letter-spacing: -0.02em;
    }

    .logo-mark {
      width: 40px; height: 40px;
      border-radius: 11px;
      background: linear-gradient(160deg, #5ac8fa 0%, #0a84ff 60%, #0071e3 100%);
      display: grid; place-items: center;
      color: #fff;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 6px 20px -4px rgba(10, 132, 255, 0.5),
        inset 0 0.5px 0 0 rgba(255, 255, 255, 0.4),
        inset 0 -1px 1px 0 rgba(0, 0, 0, 0.12);
    }

    .logo-mark::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.18), transparent);
      pointer-events: none;
    }

    .logo-mark svg.plane {
      width: 54%;
      height: 54%;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.18));
      position: relative;
      z-index: 1;
    }

    .logo-text {
      color: var(--text);
      font-weight: 600;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      padding: 7px 14px 7px 12px;
      background: rgba(255, 255, 255, 0.06);
      border: 0.5px solid var(--glass-border);
      border-radius: var(--r-pill);
      transition: all 0.25s var(--ease-out);
      letter-spacing: -0.01em;
    }

    .status:hover {
      background: rgba(255, 255, 255, 0.09);
      border-color: var(--glass-border-bright);
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-tertiary);
      transition: all 0.3s var(--ease-out);
    }

    .dot.online {
      background: var(--success);
      box-shadow: 0 0 0 3px rgba(48, 209, 88, 0.18), 0 0 12px rgba(48, 209, 88, 0.5);
      animation: dot-pulse 2.4s ease-in-out infinite;
    }
    .dot.offline {
      background: var(--danger);
      box-shadow: 0 0 8px rgba(255, 69, 58, 0.6);
    }
    .dot.loading {
      background: var(--accent);
      animation: dot-loading 1.2s ease-in-out infinite;
    }

    @keyframes dot-pulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(48, 209, 88, 0.18), 0 0 12px rgba(48, 209, 88, 0.5); }
      50%      { box-shadow: 0 0 0 6px rgba(48, 209, 88, 0.05), 0 0 18px rgba(48, 209, 88, 0.6); }
    }

    @keyframes dot-loading {
      0%, 100% { transform: scale(0.85); opacity: 0.6; }
      50%      { transform: scale(1.2); opacity: 1; }
    }

    /* ========= 网格布局 ========= */
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
    }

    @media (min-width: 880px) {
      .grid { grid-template-columns: 1fr 1fr; }
      .span-full { grid-column: span 2; }
    }

    /* ========= 玻璃卡片 ========= */
    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 0.5px solid var(--glass-border);
      border-radius: var(--r-xl);
      padding: 24px;
      box-shadow: var(--shadow-card);
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 18px;
      transition: all 0.5s var(--ease-out);
      animation: fade-up 0.8s var(--ease-out) backwards;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--r-xl);
      background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 25%);
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-2px);
      background: var(--glass-bg-strong);
      border-color: var(--glass-border-bright);
      box-shadow: 0 16px 50px -10px rgba(0, 0, 0, 0.6), 0 0 0 0.5px rgba(255, 255, 255, 0.1);
    }

    /* ========= 图片卡片 ========= */
    .image-drop-zone {
      min-height: 130px;
      padding: 28px;
      border: 2px dashed rgba(255, 255, 255, 0.12);
      border-radius: var(--r-md);
      background: rgba(0, 0, 0, 0.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.25s var(--ease-out);
      text-align: center;
    }

    .image-drop-zone:hover,
    .image-drop-zone.drag-over {
      border-color: rgba(10, 132, 255, 0.5);
      background: rgba(10, 132, 255, 0.06);
    }

    .image-drop-zone svg.drop-icon { width: 38px; height: 38px; color: var(--text-tertiary); }

    .image-drop-zone .drop-text {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .image-drop-zone .drop-hint {
      font-size: 12px;
      color: var(--text-tertiary);
    }

    .image-preview {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--r-md);
      overflow: hidden;
      background: rgba(0, 0, 0, 0.28);
    }

    .image-preview img {
      max-width: 100%;
      max-height: 220px;
      object-fit: contain;
      display: block;
    }

    .image-display {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--r-md);
      overflow: hidden;
      background: rgba(0, 0, 0, 0.28);
      min-height: 130px;
    }

    .image-display img {
      max-width: 100%;
      max-height: 320px;
      object-fit: contain;
      display: block;
    }

    .image-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-tertiary);
      min-height: 130px;
      border: 1px dashed rgba(255, 255, 255, 0.08);
      border-radius: var(--r-md);
      background: rgba(0, 0, 0, 0.18);
    }

    .image-placeholder svg { width: 38px; height: 38px; opacity: 0.45; }

    .image-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-secondary);
      gap: 8px;
    }

    .image-info .img-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .btn-remove {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(255, 69, 58, 0.18);
      border: 0.5px solid rgba(255, 69, 58, 0.3);
      color: var(--danger);
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 16px;
      line-height: 1;
      transition: all 0.2s;
      font-family: inherit;
    }

    .btn-remove:hover {
      background: rgba(255, 69, 58, 0.28);
    }

    .thumb-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 8px;
      max-height: 260px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .thumb-item {
      position: relative;
      border-radius: var(--r-xs);
      overflow: hidden;
      aspect-ratio: 1;
      background: rgba(0, 0, 0, 0.28);
      border: 0.5px solid rgba(255, 255, 255, 0.08);
    }

    .thumb-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .thumb-remove {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.7);
      border: none;
      color: #fff;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      display: grid;
      place-items: center;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .thumb-item:hover .thumb-remove { opacity: 1; }

    .thumb-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100px;
      color: var(--text-tertiary);
      font-size: 13px;
    }

    .image-history-grid {
      max-height: 460px;
    }

    .history-thumb {
      position: relative;
      border-radius: var(--r-sm);
      overflow: hidden;
      aspect-ratio: 1;
      cursor: pointer;
      background: rgba(0, 0, 0, 0.28);
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      transition: all 0.25s var(--ease-out);
    }

    .history-thumb:hover {
      border-color: rgba(10, 132, 255, 0.5);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px -6px rgba(0, 0, 0, 0.5);
    }

    .history-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .history-thumb .thumb-overlay {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      padding: 8px 10px;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.75));
      display: flex;
      flex-direction: column;
      gap: 2px;
      pointer-events: none;
    }

    .history-thumb .thumb-name {
      font-size: 11px;
      color: #fff;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-thumb .thumb-meta {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.7);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Lightbox overlay */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 9998;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      animation: fade-in 0.2s ease-out;
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .lightbox img {
      max-width: 92vw;
      max-height: 72vh;
      object-fit: contain;
      border-radius: var(--r-md);
      box-shadow: 0 20px 60px -10px rgba(0,0,0,0.6);
    }

    .lightbox .lightbox-info {
      color: var(--text-soft);
      font-size: 13px;
      text-align: center;
    }

    .lightbox .lightbox-actions {
      display: flex;
      gap: 10px;
    }

    .lightbox .lightbox-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: 0.5px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: all 0.2s;
    }

    .lightbox .lightbox-close:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .grid > .card:nth-child(1) { animation-delay: 0.1s; }
    .grid > .card:nth-child(2) { animation-delay: 0.2s; }
    .grid > .card:nth-child(3) { animation-delay: 0.3s; }
    .grid > .card:nth-child(4) { animation-delay: 0.35s; }
    .grid > .card:nth-child(5) { animation-delay: 0.4s; }
    .grid > .card:nth-child(6) { animation-delay: 0.45s; }

    .card-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .card-title .title-text {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-title .title-icon {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: rgba(10, 132, 255, 0.16);
      border: 0.5px solid rgba(10, 132, 255, 0.28);
      display: grid; place-items: center;
      color: var(--accent);
    }
    .card-title .title-icon svg { width: 15px; height: 15px; }

    .card-title .title-icon.send {
      background: rgba(90, 200, 250, 0.16);
      border-color: rgba(90, 200, 250, 0.3);
      color: var(--accent-light);
    }

    .card-title .title-icon.time {
      background: rgba(255, 159, 10, 0.14);
      border-color: rgba(255, 159, 10, 0.28);
      color: var(--warning);
    }

    .card-title .meta {
      font-size: 12px;
      color: var(--text-tertiary);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
    }

    /* ========= 收到的文字 ========= */
    .received-text {
      min-height: 130px;
      max-height: 320px;
      overflow-y: auto;
      padding: 18px;
      background: rgba(0, 0, 0, 0.28);
      border: 0.5px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--r-md);
      font-size: 16px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
      transition: all 0.3s var(--ease-out);
      letter-spacing: -0.005em;
    }

    .received-text.empty {
      color: var(--text-tertiary);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      border: 1px dashed rgba(255, 255, 255, 0.08);
      background: rgba(0, 0, 0, 0.18);
      font-weight: 500;
    }

    .received-text.flash {
      animation: shimmer 1.6s ease-out;
    }

    @keyframes shimmer {
      0% {
        background: rgba(10, 132, 255, 0.18);
        border-color: rgba(10, 132, 255, 0.5);
        box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.12), 0 0 24px rgba(10, 132, 255, 0.3);
      }
      100% {
        background: rgba(0, 0, 0, 0.28);
        border-color: rgba(255, 255, 255, 0.06);
        box-shadow: none;
      }
    }

    /* ========= 编辑器 ========= */
    .editor-wrapper {
      position: relative;
      width: 100%;
    }

    textarea.editor {
      width: 100%;
      min-height: 130px;
      max-height: 320px;
      padding: 18px 18px 38px;
      background: rgba(0, 0, 0, 0.28);
      border: 0.5px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--r-md);
      color: var(--text);
      font-size: 16px;
      line-height: 1.65;
      font-family: inherit;
      resize: vertical;
      outline: none;
      transition: all 0.25s var(--ease-out);
      letter-spacing: -0.005em;
    }

    textarea.editor:focus {
      border-color: rgba(10, 132, 255, 0.5);
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.14);
    }

    textarea.editor::placeholder { color: var(--text-tertiary); }

    .char-count {
      position: absolute;
      right: 12px;
      bottom: 12px;
      font-size: 11px;
      color: var(--text-tertiary);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      pointer-events: none;
      background: rgba(0, 0, 0, 0.45);
      padding: 3px 9px;
      border-radius: var(--r-pill);
      border: 0.5px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* ========= 按钮 ========= */
    .btn-row {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .btn {
      flex: 1;
      height: 48px;
      padding: 0 18px;
      border-radius: var(--r-md);
      border: 0.5px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: all 0.2s var(--ease-out);
      user-select: none;
      outline: none;
      position: relative;
      overflow: hidden;
      letter-spacing: -0.01em;
      font-family: inherit;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(255, 255, 255, 0.14) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .btn:hover::after { opacity: 1; }

    .btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--glass-border-bright);
      transform: translateY(-1px);
    }

    .btn:active { transform: translateY(0) scale(0.985); }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
    }

    .btn.primary {
      background: linear-gradient(180deg, #4aa8ff 0%, #0a84ff 60%, #0071e3 100%);
      border: none;
      color: #fff;
      box-shadow:
        0 4px 16px -3px rgba(10, 132, 255, 0.5),
        inset 0 0.5px 0 0 rgba(255, 255, 255, 0.32),
        inset 0 -1px 0 0 rgba(0, 0, 0, 0.08);
    }

    .btn.primary:hover {
      transform: translateY(-1px);
      box-shadow:
        0 8px 24px -4px rgba(10, 132, 255, 0.6),
        inset 0 0.5px 0 0 rgba(255, 255, 255, 0.42),
        inset 0 -1px 0 0 rgba(0, 0, 0, 0.08);
      filter: brightness(1.05);
    }

    .btn.primary:active { filter: brightness(0.95); }

    .btn.danger {
      color: var(--danger);
      background: rgba(255, 69, 58, 0.1);
      border-color: rgba(255, 69, 58, 0.22);
    }
    .btn.danger:hover {
      background: rgba(255, 69, 58, 0.16);
      border-color: rgba(255, 69, 58, 0.4);
    }

    .btn.ghost {
      background: transparent;
      border-color: transparent;
      color: var(--text-secondary);
      flex: 0;
      min-width: 70px;
    }
    .btn.ghost:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
    }

    .btn svg { width: 17px; height: 17px; transition: transform 0.25s var(--ease-out); stroke-width: 2; }
    .btn:hover svg { transform: scale(1.08); }

    /* ========= 历史 ========= */
    .history {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 460px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .history-item {
      background: rgba(0, 0, 0, 0.22);
      border: 0.5px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--r-md);
      padding: 13px 16px;
      cursor: pointer;
      transition: all 0.25s var(--ease-out);
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: fade-up 0.5s var(--ease-out) backwards;
      position: relative;
    }

    .history-item:hover {
      background: rgba(10, 132, 255, 0.08);
      border-color: rgba(10, 132, 255, 0.28);
      transform: translateX(2px);
    }

    .history-item .text {
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 96px;
      overflow: hidden;
      color: var(--text-soft);
      letter-spacing: -0.005em;
    }

    .history-item .time {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-tertiary);
      display: flex;
      align-items: center;
      justify-content: space-between;
      letter-spacing: 0;
    }

    .device-tag {
      font-size: 10px;
      padding: 3px 9px;
      border-radius: var(--r-pill);
      background: rgba(10, 132, 255, 0.14);
      border: 0.5px solid rgba(10, 132, 255, 0.24);
      color: var(--text-soft);
      letter-spacing: 0.04em;
      font-weight: 600;
      text-transform: uppercase;
    }

    .device-tag.remote {
      background: rgba(48, 209, 88, 0.14);
      border-color: rgba(48, 209, 88, 0.24);
    }

    .history-empty {
      text-align: center;
      color: var(--text-tertiary);
      padding: 36px 14px;
      font-size: 14px;
      border: 1px dashed rgba(255, 255, 255, 0.06);
      border-radius: var(--r-md);
      font-weight: 500;
    }

    /* ========= Toast ========= */
    .toast-wrap {
      position: fixed;
      left: 50%;
      bottom: 40px;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
      z-index: 9999;
    }

    .toast {
      background: rgba(28, 28, 30, 0.85);
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      border: 0.5px solid var(--glass-border);
      color: var(--text);
      padding: 13px 24px;
      border-radius: var(--r-pill);
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 16px 40px -10px rgba(0, 0, 0, 0.7), 0 0 0 0.5px rgba(255, 255, 255, 0.06);
      animation: toast-in 0.4s var(--ease-spring);
      max-width: 90vw;
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: -0.01em;
    }

    .toast.success {
      border-color: rgba(48, 209, 88, 0.32);
      color: #d6ffe1;
    }
    .toast.error {
      border-color: rgba(255, 69, 58, 0.32);
      color: #ffdcd9;
    }

    @keyframes toast-in {
      from { transform: translateY(28px) scale(0.95); opacity: 0; }
      to   { transform: translateY(0)    scale(1);    opacity: 1; }
    }

    /* ========= 滚动条 ========= */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.12);
      border-radius: var(--r-pill);
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.22);
      background-clip: padding-box;
    }

    /* ========= Footer ========= */
    footer {
      text-align: center;
      color: var(--text-tertiary);
      font-size: 12px;
      padding: 14px 0;
      font-weight: 500;
      animation: fade-up 1s 0.4s var(--ease-out) backwards;

  </style>
</head>

  <script>
    // ============================================================
    // 背景照片轮播：120+ 张丝滑模糊互切（多源容灾）
    // ============================================================
    (function () {
      const CONFIG = {
        count: 120,
        showMs: 4000,        // ⏱ 单张展示时长(4 秒,动感)
        sourceTimeoutMs: 3500 // 单源加载超时,超时后换下一源
      };

      // 多个图源 - 按可用性从优到劣排列
      // 每个函数接收一个唯一种子 seed,返回一张图的 URL
      const SOURCES = [
        // 国内 CDN: 高清风景照片(几千张池),China-friendly
        (seed) => `https://t.alcy.cc/fj/?_=${seed}`,
        // 国内 CDN: Bing 必应每日壁纸(每张种子返回当时收录的一张)
        (seed) => `https://api.dujin.org/bing/1920.php?_=${seed}`,
        // 国际 CDN: Picsum 兜底(国内不稳)
        (seed) => `https://picsum.photos/seed/wzc${seed}/1920/1080`
      ];

      const layers = [
        document.getElementById('bg-1'),
        document.getElementById('bg-2')
      ];
      let active = 0, idx = 0;

      // 打乱 1..count 的种子顺序 (Fisher–Yates)
      const order = Array.from({ length: CONFIG.count }, (_, i) => i + 1);
      for (let i = order.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [order[i], order[j]] = [order[j], order[i]];
      }

      // 加载单张图,带超时控制
      function preloadOne(url) {
        return new Promise((resolve) => {
          const img = new Image();
          let done = false;
          const finish = (val) => { if (!done) { done = true; resolve(val); } };
          img.onload = () => finish(url);
          img.onerror = () => finish(null);
          img.src = url;
          setTimeout(() => finish(null), CONFIG.sourceTimeoutMs);
        });
      }

      // 依次尝试多个图源,直到一个成功
      async function loadPhoto(seed) {
        for (const src of SOURCES) {
          const url = await preloadOne(src(seed));
          if (url) return url;
        }
        return null;
      }

      async function swap() {
        const nextSeed = order[(idx + 1) % order.length];
        const url = await loadPhoto(nextSeed);
        if (!url) { idx = (idx + 1) % order.length; return; }

        const next = (active + 1) % 2;
        layers[next].style.backgroundImage = `url("${url}")`;
        // 强制重排后再加上 active 以触发 transition
        void layers[next].offsetHeight;
        layers[next].classList.add('active');
        layers[active].classList.remove('active');
        active = next;
        idx = (idx + 1) % order.length;

        // 提前预加载下一张以保证丝滑过渡
        loadPhoto(order[(idx + 1) % order.length]);
      }

      async function init() {
        const url = await loadPhoto(order[0]);
        if (url) {
          layers[0].style.backgroundImage = `url("${url}")`;
          layers[0].classList.add('active');
        }
        loadPhoto(order[1]); // 预加载第二张
        setInterval(swap, CONFIG.showMs);
      }

      init();
    })();

    // ============================================================

    // ============================================================
    document.querySelectorAll('.btn').forEach((btn) => {
      btn.addEventListener('mousemove', (e) => {
        const r = btn.getBoundingClientRect();
        btn.style.setProperty('--mx', `${e.clientX - r.left}px`);
        btn.style.setProperty('--my', `${e.clientY - r.top}px`);
      });

    // ============================================================
    // 工具函数
    // ============================================================
    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);

    function toast(msg, type = '') {
      const el = document.createElement('div');
      el.className = 'toast ' + type;
      el.textContent = msg;
      $('#toast-wrap').appendChild(el);
      setTimeout(() => {
        el.style.transition = 'opacity 0.3s';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 300);
      }, 1800);
    }

    function formatTime(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      const now = new Date();
      const diff = now - d;
      if (diff < 60_000) return '刚刚';
      if (diff < 3600_000) return Math.floor(diff / 60_000) + ' 分钟前';
      const sameDay = d.toDateString() === now.toDateString();
      const hm = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
      if (sameDay) return hm;
      return (d.getMonth()+1) + '/' + d.getDate() + ' ' + hm;
    }

    function deviceLabel() {
      const ua = navigator.userAgent;
      if (/Android/i.test(ua)) return '📱 安卓';
      if (/iPhone|iPad|iPod/i.test(ua)) return '📱 iOS';
      if (/Windows/i.test(ua)) return '💻 Windows';
      if (/Mac/i.test(ua)) return '💻 Mac';
      return '💻 电脑';
    }

    // 生成稳定的设备 ID
    function getDeviceId() {
      let id = localStorage.getItem('deviceId');
      if (!id) {
        id = 'd_' + Math.random().toString(36).slice(2, 10) + '_' + Date.now().toString(36);
        localStorage.setItem('deviceId', id);
      }
      return id;
    }

    const DEVICE_ID = getDeviceId();
    const DEVICE_LABEL = deviceLabel();

    // ============================================================
    // 状态管理
    // ============================================================
    const state = {
      lastTimestamp: 0,
      latest: null,
      online: false,
      polling: null,
      pollInterval: 2500, // 可见时 2.5 秒
      sleepInterval: 30_000, // 隐藏时 30 秒
    };

    function setStatus(kind, text) {
      const dot = $('#status-dot');
      dot.className = 'dot ' + kind;
      $('#status-text').textContent = text;
    }

    // ============================================================
    // API 调用
    // ============================================================
    async function apiGet(path) {
      const res = await fetch(path, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    }

    async function apiPost(path, body) {
      const res = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body || {})
      });
      if (!res.ok) {
        let msg = 'HTTP ' + res.status;
        try { const j = await res.json(); if (j.error) msg = j.error; } catch {}
        throw new Error(msg);
      }
      return res.json();
    }

    // ============================================================
    // 接收 & 渲染
    // ============================================================
    function renderReceived(msg) {
      const box = $('#received-text');
      const timeEl = $('#received-time');
      const btnCopy = $('#btn-copy');

      if (!msg || !msg.text) {
        box.className = 'received-text empty';
        box.textContent = '等待消息…';
        timeEl.textContent = '';
        btnCopy.disabled = true;
        return;
      }

      const isNew = msg.timestamp > state.lastTimestamp;
      box.className = 'received-text' + (isNew ? ' flash' : '');
      box.textContent = msg.text;
      const fromSelf = msg.senderId === DEVICE_ID;
      timeEl.textContent = formatTime(msg.timestamp) + (fromSelf ? ' · 来自本机' : '');
      btnCopy.disabled = false;
      state.latest = msg;
      if (isNew) state.lastTimestamp = msg.timestamp;
    }

    async function pollLatest() {
      try {
        const url = state.lastTimestamp
          ? '/api/latest?since=' + state.lastTimestamp
          : '/api/latest';
        const data = await apiGet(url);
        if (data.message) {
          renderReceived(data.message);
        } else if (!state.latest) {
          // 初始也没消息
          renderReceived(null);
        }
        if (!state.online) {
          state.online = true;
          setStatus('online', '已连接');
        }
      } catch (err) {
        state.online = false;
        setStatus('offline', '连接失败');
        console.warn('poll failed:', err);
      }
    }

    function startPolling() {
      stopPolling();
      const tick = async () => {
        await pollLatest();
        const interval = document.hidden ? state.sleepInterval : state.pollInterval;
        state.polling = setTimeout(tick, interval);
      };
      tick();
    }
    function stopPolling() {
      if (state.polling) { clearTimeout(state.polling); state.polling = null; }
    }

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        // 切回来立即拉一次
        stopPolling();
        startPolling();
      }
    });

    // ============================================================
    // 发送
    // ============================================================
    async function sendText(text) {
      if (!text || !text.trim()) {
        toast('内容不能为空', 'error');
        return false;
      }
      const btnSend = $('#btn-send');
      const btnPaste = $('#btn-paste-send');
      btnSend.disabled = true;
      btnPaste.disabled = true;
      try {
        const data = await apiPost('/api/send', { text, senderId: DEVICE_ID });
        if (data.message) renderReceived(data.message);
        loadHistory();
        toast('已发送', 'success');
        return true;
      } catch (err) {
        toast('发送失败: ' + err.message, 'error');
        return false;
      } finally {
        btnSend.disabled = false;
        btnPaste.disabled = false;
      }
    }

    // ============================================================
    // 剪贴板
    // ============================================================
    async function copyToClipboard(text) {
      if (!text) return false;
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return true;
        }
        // 后备方案
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand('copy');
        document.body.removeChild(ta);
        return ok;
      } catch (e) {
        console.warn('copy failed:', e);
        return false;
      }
    }

    async function readFromClipboard() {
      try {
        if (navigator.clipboard && navigator.clipboard.readText && window.isSecureContext) {
          return await navigator.clipboard.readText();
        }
        throw new Error('当前浏览器不支持读取剪贴板,请在文本框中手动粘贴');
      } catch (e) {
        throw e;
      }
    }

    // ============================================================
    // 历史
    // ============================================================
    async function loadHistory() {
      try {

    }

    function renderHistory(messages) {
      const box = $('#history');
      if (!messages.length) {
        box.innerHTML = '<div class="history-empty">暂无历史</div>';

      box.innerHTML = '';
      messages.forEach(m => {

        item.appendChild(text);
        item.appendChild(time);
        item.title = '点击复制';
        item.onclick = async () => {

    $('#btn-copy').onclick = async () => {
      if (!state.latest) return;
      const btn = $('#btn-copy');

      if (ok) {

        btn.style.background = 'linear-gradient(180deg, #5cdb7e 0%, #30d158 60%, #25b048 100%)';
        btn.style.boxShadow = '0 4px 16px -3px rgba(48, 209, 88, 0.5), inset 0 0.5px 0 0 rgba(255,255,255,0.32), inset 0 -1px 0 0 rgba(0,0,0,0.08)';
        setTimeout(() => {
          btn.innerHTML = originalHTML;

    $('#btn-refresh').onclick = async () => {

    $('#btn-clear-history').onclick = async () => {

      try {
        await apiPost('/api/clear');
        state.lastTimestamp = 0;
        state.latest = null;
        renderReceived(null);
        renderHistory([]);
        imageState.lastTimestamp = 0;
        imageState.latest = null;
        renderReceivedImage(null);
        toast('已清空', 'success');
      } catch (e) {
        toast('清空失败: ' + e.message, 'error');

    };

    // Ctrl/Cmd + Enter 发送
    $('#editor').addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {

      }
    });

    // ============================================================
    // 启动
    // ============================================================
    setStatus('loading', '连接中…');
    startPolling();
    loadHistory();

    // ============================================================
    // 图片功能
    // ============================================================
    const imageState = {
      lastTimestamp: 0,
      latest: null,
      queue: [], // [{file: File, dataUrl: string}]
    };

    // Canvas 压缩图片
    function compressImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const maxDim = 1600;
            let { width, height } = img;
            if (width > maxDim || height > maxDim) {
              if (width > height) {
                height = Math.round(height * maxDim / width);
                width = maxDim;
              } else {
                width = Math.round(width * maxDim / height);
                height = maxDim;
              }
            }
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.7));
          };
          img.onerror = () => reject(new Error('图片加载失败'));
          img.src = e.target.result;
        };
        reader.onerror = () => reject(new Error('读取文件失败'));
        reader.readAsDataURL(file);
      });
    }

    function validateFile(file) {
      if (!file || !file.type.startsWith('image/')) return '请选择图片文件';
      return null;
    }

    async function addToQueue(files) {
      const valid = [];
      for (const f of files) {
        const err = validateFile(f);
        if (err) { toast(err, 'error'); continue; }
        valid.push(f);
      }
      if (!valid.length) return;

      const total = valid.length;
      $('#upload-status').textContent = `压缩中 (0/${total})…`;
      $('#btn-upload').disabled = true;
      $('#drop-zone').style.display = 'none';
      renderThumbnails('loading');

      let done = 0;
      const results = await Promise.all(valid.map(file =>
        compressImage(file).then(dataUrl => {
          done++;
          $('#upload-status').textContent = `压缩中 (${done}/${total})…`;
          return { file, dataUrl };
        }).catch(err => {
          toast(`${file.name} 处理失败: ${err.message}`, 'error');
          return null;
        })
      ));

      imageState.queue = results.filter(Boolean);
      if (imageState.queue.length) {
        renderThumbnails('ready');
        $('#btn-upload').disabled = false;
        const rawTotal = imageState.queue.reduce((s, q) => s + q.file.size, 0);
        const compTotal = imageState.queue.reduce((s, q) => s + q.dataUrl.length * 0.75, 0);
        $('#upload-status').textContent = `${imageState.queue.length} 张 · 原始 ${(rawTotal/1024).toFixed(0)}KB → 压缩 ${(compTotal/1024).toFixed(0)}KB`;
      } else {
        clearUploadQueue();
        $('#upload-status').textContent = '';
        $('#drop-zone').style.display = 'flex';
      }
    }

    function renderThumbnails(mode) {
      const grid = $('#thumb-grid');
      grid.innerHTML = '';
      if (mode === 'loading') {
        grid.style.display = 'grid';
        grid.innerHTML = '<div class="thumb-loading">处理中…</div>';
        return;
      }
      grid.style.display = 'grid';
      $('#upload-info').style.display = 'flex';
      imageState.queue.forEach((item, i) => {
        const el = document.createElement('div');
        el.className = 'thumb-item';
        el.innerHTML = `<img src="${item.dataUrl}" alt=""><button class="thumb-remove" data-idx="${i}" title="移除">&times;</button>`;
        grid.appendChild(el);
      });
      // bind remove buttons
      grid.querySelectorAll('.thumb-remove').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          const idx = parseInt(btn.dataset.idx);
          imageState.queue.splice(idx, 1);
          if (imageState.queue.length) {
            renderThumbnails('ready');
            const rawTotal = imageState.queue.reduce((s, q) => s + q.file.size, 0);
            const compTotal = imageState.queue.reduce((s, q) => s + q.dataUrl.length * 0.75, 0);
            $('#upload-status').textContent = `${imageState.queue.length} 张 · 原始 ${(rawTotal/1024).toFixed(0)}KB → 压缩 ${(compTotal/1024).toFixed(0)}KB`;
          } else {
            clearUploadQueue();
          }
        };
      });
    }

    function clearUploadQueue() {
      imageState.queue = [];
      $('#thumb-grid').style.display = 'none';
      $('#thumb-grid').innerHTML = '';
      $('#drop-zone').style.display = 'flex';
      $('#upload-info').style.display = 'none';
      $('#btn-upload').disabled = true;
      $('#upload-status').textContent = '';
      $('#file-input').value = '';
    }

    async function uploadImage() {
      if (!imageState.queue.length) {
        toast('请先选择图片', 'error');
        return false;
      }
      const btn = $('#btn-upload');
      btn.disabled = true;
      const total = imageState.queue.length;
      let ok = 0, fail = 0;

      for (let i = 0; i < total; i++) {
        const item = imageState.queue[i];
        $('#upload-status').textContent = `上传中 (${i + 1}/${total})…`;
        try {
          const data = await apiPost('/api/upload-image', {
            image: item.dataUrl,
            filename: item.file.name,
            senderId: DEVICE_ID
          });
          if (data.ok) ok++;
        } catch (err) {
          fail++;
          toast(`${item.file.name} 上传失败: ${err.message}`, 'error');
        }
      }

      clearUploadQueue();
      await pollImageLatest();
      await loadImageHistory();
      if (fail === 0) {
        toast(`${ok} 张图片已上传`, 'success');
      } else {
        toast(`${ok} 张成功, ${fail} 张失败`, ok > 0 ? 'success' : 'error');
      }
      btn.disabled = false;
    }

    function renderReceivedImage(msg) {
      const box = $('#received-image');
      const timeEl = $('#received-image-time');
      const infoEl = $('#received-image-info');
      const btnDownload = $('#btn-download');
      const btnCopy = $('#btn-copy-image');
      const nameEl = $('#received-image-name');
      const tagEl = $('#received-image-tag');

      if (!msg || !msg.image) {
        box.className = 'image-placeholder';
        box.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>等待图片…</span>';
        timeEl.textContent = '';
        infoEl.style.display = 'none';
        btnDownload.disabled = true;
        btnCopy.disabled = true;
        return;
      }

      box.className = 'image-display';
      box.innerHTML = `<img src="${msg.image}" alt="">`;
      timeEl.textContent = formatTime(msg.timestamp);
      infoEl.style.display = 'flex';
      nameEl.textContent = msg.filename || '图片';
      const fromSelf = msg.senderId === DEVICE_ID;
      tagEl.textContent = fromSelf ? '本机' : '远端';
      tagEl.className = 'device-tag' + (fromSelf ? '' : ' remote');
      btnDownload.disabled = false;
      btnCopy.disabled = false;
    }

    async function pollImageLatest() {
      try {
        const url = imageState.lastTimestamp
          ? '/api/image-latest?since=' + imageState.lastTimestamp
          : '/api/image-latest';
        const data = await apiGet(url);
        if (data.message) {
          imageState.latest = data.message;
          imageState.lastTimestamp = data.message.timestamp;
          renderReceivedImage(data.message);
        } else if (!imageState.latest) {
          renderReceivedImage(null);
        }
      } catch (err) {
        console.warn('image poll failed:', err);
      }
    }

    function downloadImage(dataUrl, filename) {
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = filename || 'image.jpg';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    async function copyImageToClipboard(dataUrl) {
      try {
        const res = await fetch(dataUrl);
        const blob = await res.blob();
        await navigator.clipboard.write([
          new ClipboardItem({ [blob.type]: blob })
        ]);
        return true;
      } catch (e) {
        console.warn('copy image failed:', e);
        return false;
      }
    }

    function startImagePolling() {
      const tick = async () => {
        await Promise.all([pollImageLatest(), loadImageHistory()]);
        const interval = document.hidden ? state.sleepInterval : state.pollInterval;
        setTimeout(tick, interval);
      };
      tick();
    }

    async function loadImageHistory() {
      try {
        const data = await apiGet('/api/image-history?count=48');
        renderImageHistory(data.messages || []);
      } catch (err) {
        console.warn('image-history load failed:', err);
      }
    }

    function renderImageHistory(messages) {
      const grid = $('#image-history-grid');
      const countEl = $('#image-history-count');

      if (!messages.length) {
        grid.innerHTML = '<div class="history-empty">暂无图片</div>';
        countEl.textContent = '';
        return;
      }

      countEl.textContent = messages.length + ' 张';
      grid.innerHTML = '';
      messages.forEach((m, i) => {
        const el = document.createElement('div');
        el.className = 'history-thumb';
        el.innerHTML = `
          <img src="${m.image}" alt="" loading="lazy">
          <div class="thumb-overlay">
            <span class="thumb-name">${escapeHtml(m.filename || '图片')}</span>
            <span class="thumb-meta">
              <span>${formatTime(m.timestamp)}</span>
              <span class="device-tag${m.senderId === DEVICE_ID ? '' : ' remote'}" style="font-size:9px;padding:1px 6px;">${m.senderId === DEVICE_ID ? '本机' : '远端'}</span>
            </span>
          </div>`;
        el.onclick = () => openLightbox(m);
        el.title = '点击查看大图 / 右键保存';
        grid.appendChild(el);
      });
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function openLightbox(msg) {
      const existing = document.querySelector('.lightbox');
      if (existing) existing.remove();

      const lb = document.createElement('div');
      lb.className = 'lightbox';
      lb.innerHTML = `
        <button class="lightbox-close">&times;</button>
        <img src="${msg.image}" alt="">
        <div class="lightbox-info">${escapeHtml(msg.filename || '图片')} · ${formatTime(msg.timestamp)}</div>
        <div class="lightbox-actions">
          <button class="btn primary" id="lb-download" style="flex:none;padding:0 20px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            下载
          </button>
          <button class="btn" id="lb-copy" style="flex:none;padding:0 20px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;"><rect x="9" y="9" width="13" height="13" rx="3"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            复制
          </button>
        </div>`;

      lb.querySelector('.lightbox-close').onclick = () => lb.remove();
      lb.querySelector('#lb-download').onclick = () => {
        downloadImage(msg.image, msg.filename);
        toast('开始下载', 'success');
      };
      lb.querySelector('#lb-copy').onclick = async () => {
        const ok = await copyImageToClipboard(msg.image);
        toast(ok ? '已复制' : '复制失败', ok ? 'success' : 'error');
      };
      lb.addEventListener('click', (e) => {
        if (e.target === lb) lb.remove();
      });
      document.addEventListener('keydown', function escHandler(e) {
        if (e.key === 'Escape') { lb.remove(); document.removeEventListener('keydown', escHandler); }
      });

      document.body.appendChild(lb);
    }

    // --- 图片事件绑定 ---
    $('#btn-upload').onclick = () => uploadImage();

    $('#btn-download').onclick = () => {
      if (!imageState.latest || !imageState.latest.image) return;
      downloadImage(imageState.latest.image, imageState.latest.filename);
      toast('开始下载', 'success');
    };

    $('#btn-copy-image').onclick = async () => {
      if (!imageState.latest || !imageState.latest.image) return;
      const ok = await copyImageToClipboard(imageState.latest.image);
      toast(ok ? '图片已复制到剪贴板' : '复制失败（浏览器可能不支持）', ok ? 'success' : 'error');
    };

    const dropZone = $('#drop-zone');
    const fileInput = $('#file-input');

    dropZone.onclick = () => fileInput.click();
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); };
    dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
    dropZone.ondrop = (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const files = Array.from(e.dataTransfer.files);
      if (files.length) addToQueue(files);
    };

    $('#btn-remove-image').onclick = () => clearUploadQueue();

    fileInput.onchange = () => {
      const files = Array.from(fileInput.files);
      if (files.length) addToQueue(files);
    };

    $('#btn-paste-image').onclick = async () => {
      try {
        const items = await navigator.clipboard.read();
        for (const item of items) {
          for (const type of item.types) {
            if (type.startsWith('image/')) {
              const blob = await item.getType(type);
              const file = new File([blob], 'clipboard.png', { type });
              addToQueue([file]);
              return;
            }
          }
        }
        toast('剪贴板中没有图片', 'error');
      } catch (e) {
        toast('读取剪贴板失败: ' + (e.message || '权限不足'), 'error');
      }
    };

    // 页面任意位置粘贴图片（不在编辑器中时）
    document.addEventListener('paste', (e) => {
      if (document.activeElement === $('#editor')) return;
      const items = e.clipboardData && e.clipboardData.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          const blob = item.getAsFile();
          const file = new File([blob], 'clipboard.png', { type: item.type });
          addToQueue([file]);
          return;
        }
      }
    });

    // 启动图片轮询
    startImagePolling();

    // 注册 Service Worker (PWA 离线缓存)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => console.warn('SW reg failed', err));
      });
    }
  </script>
</body>
</html>
