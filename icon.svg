<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5ac8fa"/>
      <stop offset="55%" stop-color="#0a84ff"/>
      <stop offset="100%" stop-color="#0058c4"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- 圆角渐变底（iOS 连续曲率近似）-->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- 顶部内反光 -->
  <rect width="512" height="256" rx="112" fill="url(#sheen)"/>
  <!-- 纸飞机主体（白色填充）-->
  <polygon points="469,43 320,469 235,277 43,192"
           fill="#ffffff" stroke="#ffffff" stroke-width="6" stroke-linejoin="round"/>
  <!-- 折痕（淡蓝一笔，与底色和谐）-->
  <line x1="469" y1="43" x2="235" y2="277"
        stroke="#0a84ff" stroke-opacity="0.32"
        stroke-width="6" stroke-linecap="round"/>
</svg>
