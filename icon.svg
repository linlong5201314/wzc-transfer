<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- 圆角渐变底 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- 顶部内反光 -->
  <rect width="512" height="240" rx="112" fill="#ffffff" fill-opacity="0.10"/>
  <!-- 纸飞机主体（白色填充） -->
  <polygon points="469,43 320,469 235,277 43,192"
           fill="#ffffff" stroke="#ffffff" stroke-width="6" stroke-linejoin="round"/>
  <!-- 折痕（淡紫一笔） -->
  <line x1="469" y1="43" x2="235" y2="277"
        stroke="#a855f7" stroke-opacity="0.35"
        stroke-width="6" stroke-linecap="round"/>
</svg>
